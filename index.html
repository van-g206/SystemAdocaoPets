<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4a30e" />
    <meta name="description" content="Encontre seu novo melhor amigo - Sistema de adoção de pets" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PetAdopt" />
    <link rel="manifest" href="/SystemAdocaoPets/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/SystemAdocaoPets/icon.svg" />
    <title>PetAdopt - Adoção de Animais</title>
    <style>
      html, body { height: 100%; margin: 0; }
      #root { height: 100%; }
    </style>
    <!-- SPA redirect para GitHub Pages (vindo do 404.html) -->
    <script>
      (function() {
        var redirect = sessionStorage.getItem('redirect');
        if (redirect) {
          sessionStorage.removeItem('redirect');
          var base = '/SystemAdocaoPets';
          var path = redirect.replace(base, '') || '/';
          window.history.replaceState(null, null, base + path);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
